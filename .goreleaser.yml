version: 2

before:
  hooks:
    - go mod tidy
    - npm install --prefix assets
    - npm run --prefix assets build

builds:
  - main: .
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    goos:
      - linux
      - windows
      - darwin
    binary: hlsdl

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README*

gomod:
  # Build from local source to include frontend assets built in before hooks
  proxy: false  

release:
  mode: keep-existing
  draft: false
  prerelease: false

changelog:
  disable: true
